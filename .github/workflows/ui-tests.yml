name: UI Testing with Selenium

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:17
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U appuser -d appdb" --health-interval 5s --health-timeout 5s --health-retries 10

      selenium:
        image: selenium/standalone-chrome:latest
        options: --shm-size=2gb --add-host=host.docker.internal:host-gateway
        ports:
          - 4444:4444

    env:
      DB_HOST: localhost
      DB_USER: appuser
      DB_PASS: apppass
      DB_NAME: appdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Download common passwords
        run: curl -o common-passwords.txt https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/100k-most-used-passwords-NCSC.txt

      - name: Start application server
        run: |
          node server.js &
          echo $! > server.pid
          sleep 10

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -f http://localhost:3000/health && break || sleep 2
          done

      - name: Wait for Selenium
        run: |
          for i in {1..20}; do
            curl -f http://localhost:4444/wd/hub/status && break || sleep 3
          done

      - name: Run UI Tests
        env:
          BASE_URL: http://host.docker.internal:3000
        run: node ui-tests.js
        timeout-minutes: 5

      - name: Cleanup
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
            rm server.pid
          fi
