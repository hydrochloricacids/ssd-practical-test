name: Node.js Testing Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:17
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U appuser -d appdb" --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DB_HOST: localhost
      DB_USER: appuser
      DB_PASS: apppass
      DB_NAME: appdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Download common passwords
        run: curl -o common-passwords.txt https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/100k-most-used-passwords-NCSC.txt

      - name: Run Jest tests
        run: npm test
